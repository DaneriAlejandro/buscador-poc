<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador — productos-BQ</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Buscador Meilisearch</h1>
      </header>

      <form id="search-form" class="search-bar" role="search">
        <input
          id="query"
          type="search"
          name="q"
          placeholder="Ej: lavarropas, notebooks, gadnic…"
          autocomplete="off"
          autofocus
        />
        <button type="submit">Buscar</button>
      </form>

      <div class="options">
        <label>
          <input type="checkbox" id="show-scores" />
          Mostrar ranking score
        </label>
        <span id="meta" class="meta"></span>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
      <ul id="results" class="results"></ul>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
